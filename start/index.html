<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Homepage — Week Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
  <div class="navbar-logo">
    <a href="#">
      <img src= "img/amazon-logo-white.png" >
    </a>
  </div>

  <div class="navbar-search">
    <input type="text" placeholder="Cerca prodotti, categorie, brand...">
    <button type="button">Cerca</button>
  </div>

  <nav class="navbar-links">
    <a href="#">Account</a>
    <a href="#">Ordini</a>
    <a href="#" class="cart-btn">Carrello (0)</a>
  </nav>
  </header>

  <main>

    <section class="hero">
      <h1>Le offerte di oggi</h1>
    <p>Sconti fino al 70% su elettronica, libri, casa e molto altro</p>
  </section>

  <section class="categorie">
    <h2>Categorie</h2>
    <div class="categories-grid">
      
      <article class="category-card cat-elettronica">
        <div class="category-box">Elettronica</div>
        <h3>Elettronica</h3>
        <a href="#">Scopri di più</a>
      </article>

      <article class="category-card cat-libri">
        <div class="category-box">Libri</div>
        <h3>Libri</h3>
        <a href="#">Scopri di più</a>
      </article>

      <article class="category-card cat-abbigliamento">
        <div class="category-box">Abbigliamento</div>
        <h3>Abbigliamento</h3>
        <a href="#">Scopri di più</a>
      </article>

      <article class="category-card cat-casa">
        <div class="category-box">Casa</div>
        <h3>Casa</h3>
        <a href="#">Scopri di più</a>
      </article>

    </div>
    </section>

    <section class="categorie">
      <!-- 4 card categoria -->
    </section>

    <section class="prodotti">
      <!-- Griglia prodotti (Versione Base: HTML statico; Intermedia/Avanzata: generata da JS) -->
    </section>

  </main>

  <footer>
    <!-- 3 colonne di link -->
  </footer>

  <script src="script.js"></script>
</body>
</html>
